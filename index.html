<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tes Cuaca Otomatis</title>
</head>
<body>

    <div class="cuaca-container">
        <h2 id="lokasi-cuaca">Memuat Cuaca...</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Hari / Tanggal</th>
                        <th>Cuaca</th>
                        <th>Suhu</th>
                        <th>Kelembapan</th>
                    </tr>
                </thead>
                <tbody id="tabel-cuaca-body"></tbody>
            </table>
        </div>
    </div>

    <style>
        .cuaca-container { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 15px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .cuaca-container h2 { text-align: center; color: #333; margin-bottom: 15px; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: #f5f5f5; color: #333; }
    </style>

    <script>
        // Pastikan API_URL mengarah tepat ke fungsi serverless Vercel Anda
//const API_URL = '/api/cuaca'; 
        // Ganti baris API_URL lama Anda dengan kode di bawah ini:
const API_URL = window.location.origin + '/api/cuaca';

const emojiCuaca = {
    'Clear': '☀️', 'Clouds': '☁️', 'Rain': '🌧️', 'Drizzle': '🌦️', 'Thunderstorm': '⛈️'
};

async function ambilDataCuaca() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();

        // JIKA SERVER BACKEND MENGIRIM ERROR, TAMPILKAN DI KONSOL BROWSER
        if (data.error) {
            console.error("Error dari Backend Vercel:", data.error);
            document.getElementById('lokasi-cuaca').innerText = 'Gagal memuat data cuaca';
            return;
        }

        document.getElementById('lokasi-cuaca').innerText = `Prakiraan Cuaca ${data.city.name}`;
        const tbody = document.getElementById('tabel-cuaca-body');
        tbody.innerHTML = '';

        // OpenWeatherMap mengirim data per 3 jam. Kita filter agar hanya mengambil data harian.
        // Jika filter "12:00:00" kosong karena perbedaan zona waktu, kita ambil data tiap kelipatan 8 indeks (24 jam)
        const listHarian = data.list.filter((item, index) => index % 8 === 0).slice(0, 6);

        listHarian.forEach(item => {
            const opsiTanggal = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            const tanggalFormat = new Date(item.dt * 1000).toLocaleDateString('id-ID', opsiTanggal);
            
            // Ambil kondisi cuaca utama untuk menentukan emoji
            const kondisiUtama = item.weather[0].main;
            const emoji = emojiCuaca[kondisiUtama] || '✨';
            const deskripsi = item.weather[0].description;

            tbody.innerHTML += `
                <tr>
                    <td><strong>${tanggalFormat}</strong></td>
                    <td>${emoji} ${deskripsi.charAt(0).toUpperCase() + deskripsi.slice(1)}</td>
                    <td>${Math.round(item.main.temp)}°C</td>
                    <td>${item.main.humidity}%</td>
                </tr>
            `;
        });
    } catch (error) {
        console.error("Gagal fetch data dari frontend:", error);
        document.getElementById('lokasi-cuaca').innerText = 'Gagal memuat data cuaca';
    }
}
ambilDataCuaca();

    </script>
</body>
</html>
