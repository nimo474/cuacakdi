<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tes Cuaca Otomatis</title>
</head>
<body>

    <div class="cuaca-container">
        <h2 id="lokasi-cuaca">Memuat Cuaca...</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Hari / Tanggal</th>
                        <th>Cuaca</th>
                        <th>Suhu</th>
                        <th>Kelembapan</th>
                    </tr>
                </thead>
                <tbody id="tabel-cuaca-body"></tbody>
            </table>
        </div>
    </div>

    <style>
        .cuaca-container { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 15px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .cuaca-container h2 { text-align: center; color: #333; margin-bottom: 15px; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: #f5f5f5; color: #333; }
    </style>

    <script>
        // Memanggil file PHP internal di folder yang sama
        const API_URL = 'ambil-cuaca.php'; 

        const emojiCuaca = {
            'Clear': '☀️', 'Clouds': '☁️', 'Rain': '🌧️', 'Drizzle': '🌦️', 'Thunderstorm': '⛈️'
        };

        async function ambilDataCuaca() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                if (data.error) throw new Error(data.error);

                document.getElementById('lokasi-cuaca').innerText = `Prakiraan Cuaca ${data.city.name}`;
                const tbody = document.getElementById('tabel-cuaca-body');
                tbody.innerHTML = '';

                // Ambil sampel data tengah hari (12:00:00) untuk 5-6 hari ke depan
                const listHarian = data.list.filter(item => item.dt_txt.includes("12:00:00"));

                listHarian.forEach(item => {
                    const opsiTanggal = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
                    const tanggalFormat = new Date(item.dt * 1000).toLocaleDateString('id-ID', opsiTanggal);
                    const emoji = emojiCuaca[item.weather[0].main] || '✨';
                    const deskripsi = item.weather[0].description;

                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${tanggalFormat}</strong></td>
                            <td>${emoji} ${deskripsi.charAt(0).toUpperCase() + deskripsi.slice(1)}</td>
                            <td>${Math.round(item.main.temp)}°C</td>
                            <td>${item.main.humidity}%</td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error(error);
                document.getElementById('lokasi-cuaca').innerText = 'Gagal memuat data cuaca';
            }
        }
        ambilDataCuaca();
    </script>
</body>
</html>
